<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elevated Fitness Service</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem 1rem; }
  .ef-wrap { background: #fff; max-width: 480px; width: 100%; padding: 2rem 1.5rem; border-radius: 12px; border: 1px solid #e0e0e0; }
  .ef-title { font-size: 28px; font-weight: 600; color: #111; margin-bottom: 1.25rem; line-height: 1.2; }
  .ef-desc { font-size: 15px; color: #555; line-height: 1.7; margin-bottom: 1.75rem; }
  .ef-checkbox-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .ef-checkbox-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
  .ef-checkbox-row label { font-size: 14px; color: #555; cursor: pointer; }
  .ef-field { margin-bottom: 1.25rem; }
  .ef-label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
  .ef-input { width: 100%; padding: 10px 14px; font-size: 15px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #111; outline: none; }
  .ef-input:focus { border-color: #888; box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
  .ef-hint { font-size: 12px; color: #999; margin-top: 4px; }
  .ef-btn { display: block; width: 100%; padding: 14px; font-size: 15px; font-weight: 600; border-radius: 999px; cursor: pointer; transition: background 0.15s; margin-bottom: 12px; }
  .ef-btn:active { transform: scale(0.98); }
  .ef-btn-Complete { background: #1b1a17; border: none; color: #ffffff; }
  .ef-btn-Complete:hover { background: #2c2b27; }
  .ef-btn-card { background: #fff; border: 1.5px solid #333; color: #111; }
  .ef-btn-card:hover { background: #f5f5f5; }
  .ef-divider { display: flex; align-items: center; gap: 10px; margin: 0.5rem 0 1rem; }
  .ef-divider span { font-size: 12px; color: #aaa; white-space: nowrap; }
  .ef-divider::before, .ef-divider::after { content: ''; flex: 1; height: 1px; background: #e0e0e0; }
  .message { margin-top: 1rem; font-size: 14px; text-align: center; }
  .error { color: red; }
  .success { color: green; }
  .info { color: blue; }
</style>
</head>
<body>
  <div class="ef-wrap">
    <h1 class="ef-title">Elevated Fitness Service</h1>
    <p class="ef-desc">In order to gain more features to our website, you must create an account or log in to an already existing account.</p>

    <div class="ef-checkbox-row">
      <input type="checkbox" id="acknowledge" />
      <label for="acknowledge">Acknowledge terms and conditions</label>
    </div>

    <div class="ef-field">
      <label class="ef-label" for="email">Email</label>
      <input class="ef-input" id="email" type="email" placeholder="Enter your email" />
    </div>

    <div class="ef-field">
      <label class="ef-label" for="password">Password</label>
      <input class="ef-input" id="password" type="password" placeholder="Create a password (min 6 characters)" />
      <p class="ef-hint">Password must be at least 6 characters</p>
    </div>

    <div class="ef-field">
      <label class="ef-label" for="confirmPassword">Confirm Password</label>
      <input class="ef-input" id="confirmPassword" type="password" placeholder="Confirm your password" />
      <p class="ef-hint">Re-enter your password</p>
    </div>

    <div style="margin-top: 2rem;">
      <button class="ef-btn ef-btn-Complete" id="signupBtn">Finish</button>
    </div>
    
    <div id="message" class="message"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js"
      }
    }
  </script>

  <script type="module">
    import { signUp } from './auth.js';
    
    const signupBtn = document.getElementById('signupBtn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const acknowledgeCheckbox = document.getElementById('acknowledge');
    const messageDiv = document.getElementById('message');

    async function handleSignUp() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      const acknowledged = acknowledgeCheckbox.checked;

      if (!email || !password || !confirmPassword) {
        messageDiv.innerHTML = '<span class="error">Please fill in all fields</span>';
        return;
      }

      if (!acknowledged) {
        messageDiv.innerHTML = '<span class="error">Please acknowledge the terms and conditions</span>';
        return;
      }

      if (password !== confirmPassword) {
        messageDiv.innerHTML = '<span class="error">Passwords do not match</span>';
        return;
      }

      if (password.length < 6) {
        messageDiv.innerHTML = '<span class="error">Password must be at least 6 characters</span>';
        return;
      }

      messageDiv.innerHTML = '<span class="info">Creating account...</span>';

      try {
        await signUp(email, password);
        messageDiv.innerHTML = '<span class="success">Account created! Redirecting to login...</span>';
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } catch (error) {
        console.error("Signup error:", error);
        let errorMsg = "Sign up failed: ";
        if (error.code === 'auth/email-already-in-use') {
          errorMsg = "An account already exists with this email. Please login.";
        } else if (error.code === 'auth/invalid-email') {
          errorMsg = "Please enter a valid email address.";
        } else if (error.code === 'auth/weak-password') {
          errorMsg = "Password is too weak. Use a stronger password.";
        } else {
          errorMsg += error.message;
        }
        messageDiv.innerHTML = `<span class="error">${errorMsg}</span>`;
      }
    }

    if (signupBtn) {
      signupBtn.addEventListener('click', handleSignUp);
    }
    
    // Allow Enter key to submit
    emailInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleSignUp();
    });
    passwordInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleSignUp();
    });
    confirmPasswordInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleSignUp();
    });
  </script>
</body>
</html>
