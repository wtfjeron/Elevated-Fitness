<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - Elevated Fitness</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
  .login-wrap { background: #fff; max-width: 420px; width: 100%; padding: 2.5rem 2rem; border-radius: 12px; border: 1px solid #e0e0e0; }
  .login-logo { display: flex; justify-content: center; margin-bottom: 2rem; }
  .login-logo-pill { border: 2px solid #111; border-radius: 999px; padding: 10px 36px; font-size: 22px; font-weight: 600; color: #111; }
  .login-field { margin-bottom: 1.25rem; }
  .login-label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
  .login-input { width: 100%; padding: 10px 14px; font-size: 15px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #111; outline: none; }
  .login-input:focus { border-color: #888; box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
  .login-hint { font-size: 12px; color: #aaa; margin-top: 4px; }
  .login-btn { display: block; width: 100%; padding: 13px; font-size: 16px; font-weight: 600; border-radius: 999px; border: 1.5px solid #333; background: #fff; color: #111; cursor: pointer; margin-top: 2rem; transition: background 0.15s; }
  .login-btn:hover { background: #f5f5f5; }
  .message { margin-top: 1rem; font-size: 14px; text-align: center; }
  .error { color: red; }
  .success { color: green; }
  .info { color: blue; }
</style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-pill"> Elevated Fitness </div>
    </div>

    <div class="login-field">
      <label class="login-label" for="email">Email</label>
      <input class="login-input" id="email" type="email" placeholder="Enter your email" />
      <p class="login-hint">Enter your registered email</p>
    </div>

    <div class="login-field">
      <label class="login-label" for="password">Password</label>
      <input class="login-input" id="password" type="password" placeholder="Enter your password" />
      <p class="login-hint">Enter your password</p>
    </div>

    <button class="login-btn" id="loginBtn">Login</button>
    
    <div id="message" class="message"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js"
      }
    }
  </script>

  <script type="module">
    import { signIn } from './auth.js';
    
    const loginBtn = document.getElementById('loginBtn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const messageDiv = document.getElementById('message');

    // Check if already logged in - redirect to index
    import { onAuthStateChange } from './auth.js';
    onAuthStateChange((user) => {
      if (user) {
        window.location.href = 'index.html';
      }
    });

    async function handleLogin() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        messageDiv.innerHTML = '<span class="error">Please enter email and password</span>';
        return;
      }

      messageDiv.innerHTML = '<span class="info">Logging in...</span>';

      try {
        await signIn(email, password);
        messageDiv.innerHTML = '<span class="success">Login successful! Redirecting...</span>';
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } catch (error) {
        console.error("Login error:", error);
        let errorMsg = "Login failed: ";
        if (error.code === 'auth/invalid-credential') {
          errorMsg = "Invalid email or password. Please try again.";
        } else if (error.code === 'auth/user-not-found') {
          errorMsg = "No account found with this email. Please sign up first.";
        } else if (error.code === 'auth/wrong-password') {
          errorMsg = "Incorrect password. Please try again.";
        } else {
          errorMsg += error.message;
        }
        messageDiv.innerHTML = `<span class="error">${errorMsg}</span>`;
      }
    }

    if (loginBtn) {
      loginBtn.addEventListener('click', handleLogin);
    }
    
    emailInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
    passwordInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
