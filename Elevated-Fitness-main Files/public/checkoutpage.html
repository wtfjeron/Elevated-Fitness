<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout - Elevated Fitness</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
  .co-page { background: #fff; max-width: 480px; width: 100%; border-radius: 12px; border: 1px solid #e0e0e0; overflow: hidden; }
  .co-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid #e0e0e0; }
  .co-back { background: none; border: none; font-size: 20px; cursor: pointer; color: #111; }
  .co-header-title { font-size: 17px; font-weight: 600; color: #111; }
  .co-body { padding: 2rem 1.5rem; }
  .co-section-title { font-size: 18px; font-weight: 600; color: #111; margin-bottom: 1.5rem; }
  .co-option { display: flex; align-items: center; gap: 14px; width: 100%; padding: 14px 20px; border: 1.5px solid #ccc; border-radius: 999px; background: #fff; font-size: 15px; font-weight: 500; cursor: pointer; margin-bottom: 12px; transition: border-color 0.15s, background 0.15s; text-align: left; }
  .co-option:hover { border-color: #888; background: #fafafa; }
  .co-option.selected { border-color: #111; background: #f5f5f5; }
  .co-option-icon { width: 32px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .co-option-label { flex: 1; color: #111; }
  .co-option-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #ccc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .co-option.selected .co-option-check { background: #111; border-color: #111; }
  .co-confirm { display: block; width: 100%; padding: 14px; font-size: 15px; font-weight: 600; border-radius: 999px; border: none; background: #111; color: #fff; cursor: pointer; margin-top: 2rem; transition: opacity 0.15s; }
  .co-confirm:hover { opacity: 0.85; }
  .co-confirm:disabled { opacity: 0.35; cursor: default; }
</style>
</head>
<body>
  <div class="co-page">
    <div class="co-header">
      <button class="co-back" onclick="history.back()">&#8592;</button>
      <span class="co-header-title">Elevated Fitness</span>
    </div>
    <div class="co-body">
      <p class="co-section-title">Payment Options</p>

      <button class="co-option" id="opt-visa" onclick="selectOption('visa')">
        <div class="co-option-icon">
          <!-- Visa icon -->
          <svg width="32" height="22" viewBox="0 0 32 22" fill="none">
            <rect width="32" height="22" rx="4" fill="#1A1F71"/>
            <path d="M12.5 15.5H10.3L11.7 6.5H13.9L12.5 15.5Z" fill="white"/>
            <path d="M8.5 6.5L6.4 12.7L6.1 11.2L5.3 7.2C5.2 6.8 4.9 6.5 4.5 6.5H1V6.7C2.1 6.9 3.1 7.4 3.9 8.1L6.3 15.5H8.6L12 6.5H8.5Z" fill="white"/>
          </svg>
        </div>
        <span class="co-option-label">Pay with Visa 3001</span>
        <div class="co-option-check" id="check-visa">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" id="tick-visa" style="display:none">
            <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>

      <button class="co-option" id="opt-paypal" onclick="selectOption('paypal')">
        <div class="co-option-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M7.5 21l.75-4.5M7.5 21H4.5M8.25 16.5l.75-4.5m0 0L10.5 6h5.25a3.75 3.75 0 010 7.5H9" stroke="#003087" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="co-option-label">Pay with PayPal</span>
        <div class="co-option-check" id="check-paypal">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" id="tick-paypal" style="display:none">
            <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>

      <button class="co-confirm" id="confirm-btn" disabled onclick="confirmPayment()">
        Continue to Payment
      </button>
    </div>
  </div>

  <script>
    let selected = null;
    function selectOption(method) {
      selected = method;
      ['visa', 'paypal'].forEach(m => {
        document.getElementById('opt-' + m).classList.toggle('selected', m === method);
        document.getElementById('tick-' + m).style.display = m === method ? 'block' : 'none';
      });
      document.getElementById('confirm-btn').disabled = false;
    }
    function confirmPayment() {
      if (!selected) return;
      alert('Proceeding with ' + (selected === 'visa' ? 'Visa 3001' : 'PayPal'));
      // Replace with your actual payment routing logic
    }
  </script>
</body>
</html>
